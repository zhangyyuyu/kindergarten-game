<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="refresh" content="0;url=https://zhangyyuyu.github.io/kindergarten-game/">
  <title>开局托儿所 - 点击即玩</title>
  <style>
    body { font-family: -apple-system, "PingFang SC", sans-serif; background: #fff5e6; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; padding: 20px; text-align: center; }
    .card { background: #fff; border-radius: 20px; padding: 32px 24px; max-width: 340px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
    h1 { color: #ff6b6b; font-size: 1.4rem; }
    p { color: #666; font-size: 0.9rem; line-height: 1.6; }
    a { display: inline-block; margin-top: 16px; padding: 14px 32px; background: #ff6b6b; color: #fff; text-decoration: none; border-radius: 50px; font-weight: bold; }
  </style>
  <script>location.replace('https://zhangyyuyu.github.io/kindergarten-game/');</script>
</head>
<body>
  <div class="card">
    <div style="font-size:3rem">🐣</div>
    <h1>开局托儿所</h1>
    <p id="tip">正在进入游戏…</p>
    <a href="https://zhangyyuyu.github.io/kindergarten-game/">🎮 点此开始游戏</a>
  </div>
  <script>
    if (/MicroMessenger/i.test(navigator.userAgent)) {
      document.getElementById('tip').innerHTML = '微信内请点右上角 <b>···</b> → <b>在浏览器中打开</b>';
    }
  </script>
</body>
</html>
