<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>开局托儿所 - 加载中...</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(160deg, #fff5e6, #ffe8f0, #e8f4ff);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      color: #2d3436;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 32px 24px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 0 12px 40px rgba(255,107,107,0.18);
    }
    .icon { font-size: 3.5rem; margin-bottom: 12px; }
    h1 { font-size: 1.5rem; color: #ff6b6b; margin-bottom: 8px; }
    p { color: #636e72; line-height: 1.6; font-size: 0.9rem; margin-bottom: 12px; }
    .status { color: #4ecdc4; font-size: 0.88rem; margin: 16px 0; min-height: 20px; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #f1f2f6;
      border-top-color: #ff6b6b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn {
      display: block; width: 100%; padding: 14px;
      border: none; border-radius: 50px;
      font-size: 1rem; font-weight: bold;
      cursor: pointer; margin-bottom: 10px; font-family: inherit;
    }
    .btn-primary { background: linear-gradient(135deg, #ff6b6b, #ff8787); color: #fff; }
    .btn-secondary { background: #f1f2f6; color: #636e72; }
    .mirrors { text-align: left; margin-top: 16px; display: none; }
    .mirrors.show { display: block; }
    .mirrors h3 { font-size: 0.85rem; color: #636e72; margin-bottom: 8px; }
    .mirror-link {
      display: block; padding: 10px 12px; margin-bottom: 6px;
      background: #f8f9fa; border-radius: 10px;
      color: #0984e3; text-decoration: none; font-size: 0.82rem;
      word-break: break-all;
    }
    .tip {
      background: #fff9e6; border: 1px solid #ffd93d;
      border-radius: 12px; padding: 12px; text-align: left;
      font-size: 0.85rem; color: #636e72; margin-top: 12px; line-height: 1.6;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🐣</div>
    <h1>开局托儿所</h1>
    <p>挑战十以内加减法 · 全平台通用入口</p>

    <div id="loading-view">
      <div class="spinner"></div>
      <div class="status" id="status">正在寻找最快线路...</div>
    </div>

    <div id="ready-view" class="hidden">
      <button class="btn btn-primary" id="btn-play">🎮 立即开始游戏</button>
      <button class="btn btn-secondary" id="btn-copy">📋 复制分享链接</button>
    </div>

    <div class="tip hidden" id="wechat-tip">
      微信用户：若无法进入，点右上角 <strong>···</strong> → <strong>在浏览器中打开</strong>
    </div>

    <div class="mirrors" id="mirrors">
      <h3>备用线路（点任意一条）：</h3>
      <div id="mirror-list"></div>
    </div>
  </div>

  <script>
    var REPO = 'zhangyyuyu/kindergarten-game';
    var GAME = 'index.html';

    // 多线路镜像，覆盖微信/QQ/各品牌手机浏览器
    var MIRRORS = [
      { name: '线路A（推荐·国内快）', url: 'https://cdn.jsdelivr.net/gh/' + REPO + '@main/' + GAME },
      { name: '线路B（Fastly CDN）', url: 'https://fastly.jsdelivr.net/gh/' + REPO + '@main/' + GAME },
      { name: '线路C（Gcore CDN）', url: 'https://gcore.jsdelivr.net/gh/' + REPO + '@main/' + GAME },
      { name: '线路D（GitHack）', url: 'https://raw.githack.com/' + REPO + '/main/' + GAME },
      { name: '线路E（GitHub Pages）', url: 'https://zhangyyuyu.github.io/kindergarten-game/' + GAME }
    ];

    var SHARE_URL = 'https://cdn.jsdelivr.net/gh/' + REPO + '@main/go.html';
    var bestUrl = '';
    var isWeChat = /MicroMessenger/i.test(navigator.userAgent);
    var isQQ = /QQ\//i.test(navigator.userAgent);

    if (isWeChat || isQQ) {
      document.getElementById('wechat-tip').classList.remove('hidden');
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    function showReady(url) {
      bestUrl = url;
      document.getElementById('loading-view').classList.add('hidden');
      document.getElementById('ready-view').classList.remove('hidden');
      document.getElementById('mirrors').classList.add('show');
    }

    function renderMirrors() {
      var list = document.getElementById('mirror-list');
      MIRRORS.forEach(function(m) {
        var a = document.createElement('a');
        a.className = 'mirror-link';
        a.href = m.url;
        a.textContent = m.name;
        list.appendChild(a);
      });
    }

    function testMirror(mirror) {
      return new Promise(function(resolve) {
        var done = false;
        var timer = setTimeout(function() {
          if (!done) { done = true; resolve(null); }
        }, 4000);

        fetch(mirror.url, { method: 'HEAD', mode: 'no-cors' })
          .then(function() {
            if (!done) { done = true; clearTimeout(timer); resolve(mirror.url); }
          })
          .catch(function() {
            // no-cors 也可能成功，视为可用
            if (!done) { done = true; clearTimeout(timer); resolve(mirror.url); }
          });
      });
    }

    function findBestMirror() {
      var index = 0;
      function tryNext() {
        if (index >= MIRRORS.length) {
          setStatus('自动检测失败，请手动选择下方线路');
          showReady(MIRRORS[0].url);
          return;
        }
        var m = MIRRORS[index];
        setStatus('检测 ' + m.name + '...');
        testMirror(m).then(function(url) {
          if (url) {
            setStatus('已连接 ' + m.name);
            showReady(url);
            // 微信内不自动跳转，让用户手动点
            if (!isWeChat && !isQQ && index === 0) {
              setTimeout(function() { window.location.href = url; }, 600);
            }
          } else {
            index++;
            tryNext();
          }
        });
      }
      tryNext();
    }

    document.getElementById('btn-play').onclick = function() {
      window.location.href = bestUrl || MIRRORS[0].url;
    };

    document.getElementById('btn-copy').onclick = function() {
      var url = SHARE_URL;
      function ok() { alert('链接已复制！发给朋友即可在任何手机打开'); }
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).then(ok);
      } else {
        var input = document.createElement('input');
        input.value = url;
        document.body.appendChild(input);
        input.select();
        document.execCommand('copy');
        document.body.removeChild(input);
        ok();
      }
    };

    renderMirrors();
    findBestMirror();
  </script>
</body>
</html>
